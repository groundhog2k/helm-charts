{{- if .Values.httpRoute.enabled }}
{{- $fullName := include "gitea.fullname" . -}}
{{- $labels := include "gitea.labels" . -}}
{{- $svcPort := .Values.services.http.port -}}
{{- with .Values.httpRoute }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ $fullName }}
  labels:
    {{- $labels | nindent 4 }}
  {{- with .labels }}
    {{- toYaml . | nindent 4 }}
  {{- end }}
  {{- with .annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  parentRefs:
  {{- if and $.Values.listenerSet.enabled (empty .parentRefs) }}
    - name: {{ include "gitea.fullname" $ }}
      group: gateway.networking.k8s.io
      kind: ListenerSet
  {{- else }}
    {{- if empty .parentRefs }}
      {{- fail "httpRoute.parentRefs is required when httpRoute.enabled is true and listenerSet.enabled is false" }}
    {{- end }}
    {{- toYaml .parentRefs | nindent 4 }}
  {{- end }}
  {{- with .hostnames }}
  hostnames:
    {{- range . }}
    - {{ . | quote }}
    {{- end }}
  {{- end }}
  rules:
    {{- range .rules }}
    - backendRefs:
        - name: {{ $fullName }}-http
          port: {{ $svcPort }}
      {{- with .matches }}
      matches:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .filters }}
      filters:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .timeouts }}
      timeouts:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    {{- end }}
{{- end }}
{{- end }}