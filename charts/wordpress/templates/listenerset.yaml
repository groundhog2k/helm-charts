{{- if .Values.listenerSet.enabled }}
{{- $fullName := include "wordpress.fullname" . -}}
{{- $labels := include "wordpress.labels" . -}}
{{- with .Values.listenerSet }}
apiVersion: gateway.networking.k8s.io/v1
kind: ListenerSet
metadata:
  name: {{ $fullName }}
  labels:
    {{- $labels | nindent 4 }}
  {{- with .labels }}
    {{- toYaml . | nindent 4 }}
  {{- end }}
  {{- with .annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- $_ := required "listenerSet.parentRef.name is required when listenerSet.enabled is true" .parentRef.name }}
  parentRef:
    {{- toYaml .parentRef | nindent 4 }}
  listeners:
    {{- toYaml .listeners | nindent 4 }}
{{- end }}
{{- end }}