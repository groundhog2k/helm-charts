apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "nextcloud.fullname" . }}-extendedconfigs
  labels:
    {{- include "nextcloud.labels" . | nindent 4 }}
data:
  {{- if not .Values.nginx.enabled }}
  000-default.conf: |
    {{- if .Values.apacheDefaultSiteConfig }}
    {{ .Values.apacheDefaultSiteConfig | nindent 4 }}
    {{- else }}
    <VirtualHost *:{{ .Values.containerPort }}>
            ServerAdmin webmaster@localhost
            DocumentRoot /var/www/html

            ErrorLog ${APACHE_LOG_DIR}/error.log
            CustomLog ${APACHE_LOG_DIR}/access.log combined
    </VirtualHost>
    {{- end }}
  ports.conf: |
    {{- if .Values.apachePortsConfig }}
    {{ .Values.apachePortsConfig | nindent 4 }}
    {{- else }}
    Listen {{ .Values.containerPort }}
    {{- end }}
  {{- end }}
  {{- if .Values.nginx.enabled }}
  nginx.conf: |
    {{- if .Values.nginxConfig }}
    {{ .Values.nginxConfig | nindent 4 }}
    {{- else }}
    upstream php-handler {
        server 127.0.0.1:{{ .Values.containerPort }};
    }
    server {
        listen {{ .Values.nginx.containerPort }};
        server_name _;

        root /var/www/html;
        index index.php index.html;

        client_body_buffer_size 512k;
        client_max_body_size {{ .Values.settings.maxFileUploadSize | default "512M" }};

        server_tokens off;
        fastcgi_hide_header X-Powered-By;

        gzip on;
        gzip_vary on;
        gzip_comp_level 4;
        gzip_min_length 256;
        gzip_proxied expired no-cache no-store private no_last_modified no_etag auth;
        gzip_types application/atom+xml text/javascript application/javascript application/json application/ld+json application/manifest+json application/rss+xml application/vnd.geo+json application/vnd.ms-fontobject application/wasm application/x-font-ttf application/x-web-app-manifest+json application/xhtml+xml application/xml font/opentype image/bmp image/svg+xml image/x-icon text/cache-manifest text/css text/plain text/vcard text/vnd.rim.location.xloc text/vtt text/x-component text/x-cross-domain-policy;

        # Load default MIME types and extend with .mjs (ES modules)
        include /etc/nginx/mime.types;
        types {
            application/javascript mjs;
            application/wasm wasm;
        }

        # .well-known redirects required by Nextcloud
        location ^~ /.well-known {
            location = /.well-known/carddav     { return 301 $scheme://$host/remote.php/dav/; }
            location = /.well-known/caldav      { return 301 $scheme://$host/remote.php/dav/; }
            # Route all other /.well-known/ URIs (webfinger, nodeinfo, etc.) through Nextcloud
            return 301 $scheme://$host/index.php$request_uri;
        }

        # Disable access log for health checks
        location = /status.php {
            access_log off;
            fastcgi_pass php-handler;
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
            include fastcgi_params;
        }

        location / {
            try_files $uri $uri/ /index.php$is_args$args;
        }

        # PHP-FPM with PATH_INFO support (required for /remote.php/dav and similar paths)
        location ~ \.php(?:$|/) {
            fastcgi_split_path_info ^(.+?\.php)(/.*)$;
            fastcgi_pass php-handler;
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
            fastcgi_param PATH_INFO $fastcgi_path_info;
            include fastcgi_params;
            fastcgi_read_timeout 300;
        }

        location ~ /\. {
            deny all;
        }
    }
    {{- end }}
  {{- end }}
  redis-session.ini: |
    {{- if .Values.redis.enabled }}
    session.save_handler = redis
    {{- if .Values.redis.password }}
    session.save_path="tcp://{{ include "redis.servicename" . }}:{{ .Values.redis.service.serverPort }}?auth={{ .Values.redis.password }}"
    {{- else }}
    session.save_path="tcp://{{ include "redis.servicename" . }}:{{ .Values.redis.service.serverPort }}"
    {{- end }}
    {{- else }}
    {{- with .Values.externalCache }}
    {{- if .enabled }}
    session.save_handler = redis
    {{- if .password }}
    session.save_path="tcp://{{ .host }}:{{ .port }}?auth={{ .password }}"
    {{- else }}
    session.save_path="tcp://{{ .host }}:{{ .port }}"
    {{- end }}
    {{- end }}
    {{- end }}
    {{- end }}
  custom.ini: |
    {{- if .Values.customPhpConfig }}
    {{ .Values.customPhpConfig | nindent 4 }}
    {{- end }}
