apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "nextcloud.fullname" . }}-extendedconfigs
  labels:
    {{- include "nextcloud.labels" . | nindent 4 }}
data:
  {{- if not .Values.nginx.enabled }}
  000-default.conf: |
    {{- if .Values.apacheDefaultSiteConfig }}
    {{ .Values.apacheDefaultSiteConfig | nindent 4 }}
    {{- else }}
    <VirtualHost *:{{ .Values.containerPort }}>
            ServerAdmin webmaster@localhost
            DocumentRoot /var/www/html

            ErrorLog ${APACHE_LOG_DIR}/error.log
            CustomLog ${APACHE_LOG_DIR}/access.log combined
    </VirtualHost>
    {{- end }}
  ports.conf: |
    {{- if .Values.apachePortsConfig }}
    {{ .Values.apachePortsConfig | nindent 4 }}
    {{- else }}
    Listen {{ .Values.containerPort }}
    {{- end }}
  {{- end }}
  {{- if .Values.nginx.enabled }}
  nginx.conf: |
    {{- if .Values.nginxConfig }}
    {{ .Values.nginxConfig | nindent 4 }}
    {{- else }}
    upstream php-handler {
        server 127.0.0.1:{{ .Values.containerPort }};
    }
    server {
        listen {{ .Values.nginx.containerPort }};
        server_name _;

        root /var/www/html;
        index index.php index.html;

        client_max_body_size {{ .Values.settings.maxFileUploadSize | default "512M" }};

        # Load default MIME types and extend with .mjs (ES modules)
        include /etc/nginx/mime.types;
        types {
            application/javascript mjs;
        }

        # .well-known redirects required by Nextcloud
        location = /.well-known/carddav {
            return 301 $scheme://$host/remote.php/dav;
        }
        location = /.well-known/caldav {
            return 301 $scheme://$host/remote.php/dav;
        }
        location = /.well-known/webfinger {
            return 301 $scheme://$host/index.php/.well-known/webfinger;
        }

        # Disable access log for health checks
        location = /status.php {
            access_log off;
            fastcgi_pass php-handler;
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
            include fastcgi_params;
        }

        location / {
            try_files $uri $uri/ /index.php$is_args$args;
        }

        # PHP-FPM with PATH_INFO support (required for /remote.php/dav and similar paths)
        location ~ \.php(?:$|/) {
            fastcgi_split_path_info ^(.+?\.php)(/.*)$;
            fastcgi_pass php-handler;
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
            fastcgi_param PATH_INFO $fastcgi_path_info;
            include fastcgi_params;
            fastcgi_read_timeout 300;
        }

        location ~ /\. {
            deny all;
        }
    }
    {{- end }}
  {{- end }}
  redis-session.ini: |
    {{- if .Values.redis.enabled }}
    session.save_handler = redis
    {{- if .Values.redis.password }}
    session.save_path="tcp://{{ include "redis.servicename" . }}:{{ .Values.redis.service.serverPort }}?auth={{ .Values.redis.password }}"
    {{- else }}
    session.save_path="tcp://{{ include "redis.servicename" . }}:{{ .Values.redis.service.serverPort }}"
    {{- end }}
    {{- else }}
    {{- with .Values.externalCache }}
    {{- if .enabled }}
    session.save_handler = redis
    {{- if .password }}
    session.save_path="tcp://{{ .host }}:{{ .port }}?auth={{ .password }}"
    {{- else }}
    session.save_path="tcp://{{ .host }}:{{ .port }}"
    {{- end }}
    {{- end }}
    {{- end }}
    {{- end }}
  custom.ini: |
    {{- if .Values.customPhpConfig }}
    {{ .Values.customPhpConfig | nindent 4 }}
    {{- end }}
