{{- if .Values.httpRoute.enabled }}
{{- $fullName := include "nextcloud.fullname" . -}}
{{- $labels := include "nextcloud.labels" . -}}
{{- $svcPort := .Values.service.port -}}
{{- $webroot := .Values.settings.overwriteWebRoot -}}
{{- with .Values.httpRoute }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ $fullName }}-web
  labels:
    {{- $labels | nindent 4 }}
  {{- with .labels }}
    {{- toYaml . | nindent 4 }}
  {{- end }}
  {{- with .annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  parentRefs:
  {{- if and $.Values.listenerSet.enabled (empty .parentRefs) }}
    - name: {{ include "nextcloud.fullname" $ }}
      group: gateway.networking.k8s.io
      kind: ListenerSet
  {{- else }}
    {{- if empty .parentRefs }}
      {{- fail "httpRoute.parentRefs is required when httpRoute.enabled is true and listenerSet.enabled is false" }}
    {{- end }}
    {{- toYaml .parentRefs | nindent 4 }}
  {{- end }}
  {{- with .hostnames }}
  hostnames:
    {{- range . }}
    - {{ . | quote }}
    {{- end }}
  {{- end }}
  rules:
    {{- range .rules }}
    - backendRefs:
        - name: {{ $fullName }}
          port: {{ $svcPort }}
      {{- if $webroot }}
      matches:
        - path:
            type: PathPrefix
            value: {{ $webroot }}
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: ""
      {{- else if .matches }}
      matches:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .filters }}
      filters:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .timeouts }}
      timeouts:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    {{- end }}
{{- end }}
{{- end }}
---
{{- if .Values.httpRoute.enabled }}
{{- $fullName := include "nextcloud.fullname" . -}}
{{- $labels := include "nextcloud.labels" . -}}
{{- $svcPort := .Values.service.port -}}
{{- $webroot := .Values.settings.overwriteWebRoot -}}
{{- with .Values.httpRoute }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ $fullName }}-dav
  labels:
    {{- $labels | nindent 4 }}
  {{- with .labels }}
    {{- toYaml . | nindent 4 }}
  {{- end }}
  {{- with .annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  parentRefs:
  {{- if and $.Values.listenerSet.enabled (empty .parentRefs) }}
    - name: {{ include "nextcloud.fullname" $ }}
      group: gateway.networking.k8s.io
      kind: ListenerSet
  {{- else }}
    {{- if empty .parentRefs }}
      {{- fail "httpRoute.parentRefs is required when httpRoute.enabled is true and listenerSet.enabled is false" }}
    {{- end }}
    {{- toYaml .parentRefs | nindent 4 }}
  {{- end }}
  {{- with .hostnames }}
  hostnames:
    {{- range . }}
    - {{ . | quote }}
    {{- end }}
  {{- end }}
  rules:
    - backendRefs:
        - name: {{ $fullName }}
          port: {{ $svcPort }}
      matches:
        {{- if $webroot }}
        - path:
            type: RegularExpression
            value: {{ $webroot }}/.well-known/ca(l|rd)dav(/|.*)
        {{- else }}
        - path:
            type: RegularExpression
            value: /.well-known/ca(l|rd)dav(/|.*)
        {{- end }}
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplaceFullPath
              replaceFullPath: /remote.php/dav/
{{- end }}
{{- end }}
